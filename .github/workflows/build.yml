name: Java CI/CD - SnapStart Lambda + Existing API Gateway

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # ─────────────────────────────────────────
    # STEP 1 - CREATE OR UPDATE LAMBDA FUNCTION
    # ─────────────────────────────────────────
    - name: Create or Update Lambda Function
      run: |
        FUNCTION_NAME="simple-lambda-snapstart"
        HANDLER="com.example.test.StreamLambdaHandler::handleRequest"
        RUNTIME="java21"
        ROLE_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.LAMBDA_ROLE_NAME }}"
        REGION="us-east-1"

        JAR_PATH=$(ls target/*.jar | head -n 1)
        echo "Using JAR: $JAR_PATH"

        FUNCTION_EXISTS=$(aws lambda get-function \
          --function-name $FUNCTION_NAME \
          --region $REGION 2>&1 || true)

        if echo "$FUNCTION_EXISTS" | grep -q "ResourceNotFoundException"; then
          echo "Creating new Lambda function: $FUNCTION_NAME"
          aws lambda create-function \
            --function-name $FUNCTION_NAME \
            --runtime $RUNTIME \
            --role $ROLE_ARN \
            --handler $HANDLER \
            --zip-file fileb://$JAR_PATH \
            --memory-size 512 \
            --timeout 30 \
            --snap-start ApplyOn=PublishedVersions \
            --environment Variables="{SPRING_PROFILES_ACTIVE=prod}" \
            --description "Spring Boot Lambda with SnapStart" \
            --region $REGION
          echo "Lambda function created successfully!"
        else
          echo "Lambda function exists. Updating code..."
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://$JAR_PATH \
            --region $REGION
        fi

    - name: Wait for Lambda to be Active
      run: |
        aws lambda wait function-active \
          --function-name simple-lambda-snapstart \
          --region us-east-1
        aws lambda wait function-updated \
          --function-name simple-lambda-snapstart \
          --region us-east-1
        echo "Lambda is active!"

    # ─────────────────────────────────────────
    # STEP 2 - UPDATE LAMBDA CONFIGURATION
    # ─────────────────────────────────────────
    - name: Update Lambda Configuration
      run: |
        aws lambda update-function-configuration \
          --function-name simple-lambda-snapstart \
          --handler com.example.test.StreamLambdaHandler::handleRequest \
          --runtime java21 \
          --memory-size 512 \
          --timeout 30 \
          --snap-start ApplyOn=PublishedVersions \
          --region us-east-1

    - name: Wait for Configuration Update
      run: |
        aws lambda wait function-updated \
          --function-name simple-lambda-snapstart \
          --region us-east-1
        sleep 5
        echo "Configuration updated!"

    # ─────────────────────────────────────────
    # STEP 3 - PUBLISH VERSION FOR SNAPSTART
    # ─────────────────────────────────────────
    - name: Publish Lambda Version
      id: publish_version
      run: |
        VERSION=$(aws lambda publish-version \
          --function-name simple-lambda-snapstart \
          --description "SnapStart - ${{ github.sha }}" \
          --query 'Version' \
          --output text \
          --region us-east-1)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Published Version: $VERSION"

    # ─────────────────────────────────────────
    # STEP 4 - WAIT FOR SNAPSTART SNAPSHOT
    # ─────────────────────────────────────────
    - name: Wait for SnapStart Snapshot
      run: |
        VERSION=${{ steps.publish_version.outputs.version }}
        REGION="us-east-1"
        FUNCTION_NAME="simple-lambda-snapstart"
        MAX_ATTEMPTS=20

        echo "Waiting for SnapStart optimization for version $VERSION..."

        for i in $(seq 1 $MAX_ATTEMPTS); do
          RESPONSE=$(aws lambda get-function \
            --function-name $FUNCTION_NAME \
            --qualifier $VERSION \
            --region $REGION)
          STATUS=$(echo $RESPONSE | jq -r '.Configuration.SnapStartResponse.OptimizationStatus')
          STATE=$(echo $RESPONSE | jq -r '.Configuration.State')

          echo "Attempt $i/$MAX_ATTEMPTS - State: $STATE - SnapStart: $STATUS"

          if [ "$STATE" == "Active" ] && [ "$STATUS" == "On" ]; then
            echo "SnapStart snapshot is ready!"
            exit 0
          fi

          if [ "$STATE" == "Failed" ]; then
            echo "Lambda version failed!"
            exit 1
          fi

          sleep 30
        done

        echo "Timed out waiting for SnapStart optimization!"
        exit 1

    # ─────────────────────────────────────────
    # STEP 5 - CREATE OR UPDATE ALIAS
    # ─────────────────────────────────────────
    - name: Create or Update Lambda Alias
      run: |
        VERSION=${{ steps.publish_version.outputs.version }}

        ALIAS_EXISTS=$(aws lambda get-alias \
          --function-name simple-lambda-snapstart \
          --name prod \
          --region us-east-1 2>&1 || true)

        if echo "$ALIAS_EXISTS" | grep -q "ResourceNotFoundException"; then
          echo "Creating new alias..."
          aws lambda create-alias \
            --function-name simple-lambda-snapstart \
            --name prod \
            --function-version $VERSION \
            --description "Production alias" \
            --region us-east-1
        else
          echo "Updating existing alias..."
          aws lambda update-alias \
            --function-name simple-lambda-snapstart \
            --name prod \
            --function-version $VERSION \
            --region us-east-1
        fi
        echo "Alias pointing to version $VERSION"

    # ─────────────────────────────────────────
    # STEP 6 - UPDATE API GATEWAY INTEGRATIONS
    # ─────────────────────────────────────────
    - name: Update Existing API Gateway Integrations
      run: |
        API_ID=${{ secrets.API_GATEWAY_ID }}
        ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
        REGION="us-east-1"
        LAMBDA_ARN="arn:aws:lambda:$REGION:$ACCOUNT_ID:function:simple-lambda-snapstart:prod"

        PRODUCTS_ID=$(aws apigateway get-resources \
          --rest-api-id $API_ID \
          --region $REGION \
          --query "items[?path=='/products'].id" \
          --output text)

        PRODUCT_ID_RESOURCE=$(aws apigateway get-resources \
          --rest-api-id $API_ID \
          --region $REGION \
          --query "items[?path=='/products/{productId}'].id" \
          --output text)

        echo "/products ID           : $PRODUCTS_ID"
        echo "/products/{productId}  : $PRODUCT_ID_RESOURCE"

        update_int() {
          aws apigateway put-integration \
            --rest-api-id $API_ID \
            --resource-id $1 \
            --http-method $2 \
            --type AWS_PROXY \
            --integration-http-method POST \
            --uri arn:aws:apigateway:$REGION:lambda:path/2015-03-31/functions/$LAMBDA_ARN/invocations \
            --region $REGION
          echo "Updated: $2 → $1"
        }

        update_int $PRODUCTS_ID GET
        update_int $PRODUCTS_ID POST
        update_int $PRODUCT_ID_RESOURCE GET
        update_int $PRODUCT_ID_RESOURCE PUT
        update_int $PRODUCT_ID_RESOURCE DELETE

    # ─────────────────────────────────────────
    # STEP 7 - PERMISSIONS & DEPLOY
    # ─────────────────────────────────────────
    - name: Finalize API Gateway
      run: |
        API_ID=${{ secrets.API_GATEWAY_ID }}
        REGION="us-east-1"

        aws lambda remove-permission \
          --function-name simple-lambda-snapstart \
          --statement-id api-invoke \
          --qualifier prod \
          --region $REGION 2>/dev/null || true

        aws lambda add-permission \
          --function-name simple-lambda-snapstart \
          --statement-id api-invoke \
          --action lambda:InvokeFunction \
          --principal apigateway.amazonaws.com \
          --source-arn "arn:aws:execute-api:$REGION:${{ secrets.AWS_ACCOUNT_ID }}:$API_ID/*/*/*" \
          --qualifier prod \
          --region $REGION

        aws apigateway create-deployment \
          --rest-api-id $API_ID \
          --stage-name snapstart \
          --description "SnapStart Deploy - ${{ github.sha }}" \
          --region $REGION

        echo "========================================="
        echo "  DEPLOYMENT COMPLETE!"
        echo "  Function : simple-lambda-snapstart"
        echo "  Stage    : snapstart"
        echo "  BASE URL : https://$API_ID.execute-api.$REGION.amazonaws.com/snapstart"
        echo "  GET  ALL : https://$API_ID.execute-api.$REGION.amazonaws.com/snapstart/products"
        echo "  POST     : https://$API_ID.execute-api.$REGION.amazonaws.com/snapstart/products"
        echo "  GET  ONE : https://$API_ID.execute-api.$REGION.amazonaws.com/snapstart/products/{productId}"
        echo "  PUT      : https://$API_ID.execute-api.$REGION.amazonaws.com/snapstart/products/{productId}"
        echo "  DELETE   : https://$API_ID.execute-api.$REGION.amazonaws.com/snapstart/products/{productId}"
        echo "  prod stage is completely untouched!"
        echo "========================================="
